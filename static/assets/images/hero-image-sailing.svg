<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Sky -->
  <rect width="800" height="400" fill="#a0d8ef" />
  
  <!-- Ocean -->
  <rect y="300" width="800" height="300" fill="#0077be" />
  
  <!-- Sailing Boat Cockpit (Wooden) -->
  <path d="M 100 600 L 700 600 L 750 450 L 50 450 Z" fill="#5d4037" />
  <path d="M 50 450 Q 400 400 750 450" fill="none" stroke="#3e2723" stroke-width="5" />
  
  <!-- Wooden Bench/Seating -->
  <rect x="150" y="480" width="500" height="40" fill="#8d6e63" rx="5" />
  
  <!-- 4 People (Stylized) in same positions -->
  <!-- Person 1 (Left) -->
  <circle cx="250" cy="440" r="30" fill="#ffcc80" /> <!-- Head -->
  <rect x="220" y="470" width="60" height="80" fill="#1565c0" rx="10" /> <!-- Body -->
  
  <!-- Person 2 (Center-Left) -->
  <circle cx="350" cy="440" r="30" fill="#ffe0b2" /> <!-- Head -->
  <rect x="320" y="470" width="60" height="80" fill="#2e7d32" rx="10" /> <!-- Body -->
  
  <!-- Person 3 (Center-Right) -->
  <circle cx="450" cy="440" r="30" fill="#ffcc80" /> <!-- Head -->
  <rect x="420" y="470" width="60" height="80" fill="#c62828" rx="10" /> <!-- Body -->
  
  <!-- Person 4 (Right) -->
  <circle cx="550" cy="440" r="30" fill="#ffe0b2" /> <!-- Head -->
  <rect x="520" y="470" width="60" height="80" fill="#ff8f00" rx="10" /> <!-- Body -->
  
  <!-- Steering Wheel (Helm) -->
  <circle cx="400" cy="520" r="40" fill="none" stroke="#3e2723" stroke-width="8" />
  <line x1="400" y1="480" x2="400" y2="560" stroke="#3e2723" stroke-width="4" />
  <line x1="360" y1="520" x2="440" y2="520" stroke="#3e2723" stroke-width="4" />
  
  <!-- Details -->
  <text x="400" y="100" font-family="Arial" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="bold">Sales Compass</text>
  <text x="400" y="130" font-family="Arial" font-size="16" fill="#ffffff" text-anchor="middle">Navigating Success Together</text>
</svg>
