<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F7FA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ocean" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#01579B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0288D1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="teak" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4E342E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6D4C41;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4E342E;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
      <feOffset dx="2" dy="4" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Sky and Sea -->
  <rect width="1200" height="400" fill="url(#sky)" />
  <rect y="400" width="1200" height="275" fill="url(#ocean)" />

  <!-- The Boat Hull/Cockpit -->
  <path d="M 0 675 L 1200 675 L 1100 420 L 100 420 Z" fill="url(#teak)" filter="url(#shadow)" />
  
  <!-- Wooden Table in Cockpit -->
  <rect x="350" y="480" width="500" height="40" fill="#3E2723" rx="5" />
  
  <!-- 4 People (Silhouettes with Professional Tone) -->
  <g opacity="0.85">
    <!-- Person 1 (Left) -->
    <circle cx="250" cy="400" r="45" fill="#263238" />
    <path d="M 180 450 Q 250 430 320 450 L 340 650 L 160 650 Z" fill="#37474F" />
    
    <!-- Person 2 (Center-Left) -->
    <circle cx="450" cy="400" r="45" fill="#263238" />
    <path d="M 380 450 Q 450 430 520 450 L 540 650 L 360 650 Z" fill="#455A64" />
    
    <!-- Person 3 (Center-Right) -->
    <circle cx="750" cy="400" r="45" fill="#263238" />
    <path d="M 680 450 Q 750 430 820 450 L 840 650 L 660 650 Z" fill="#546E7A" />
    
    <!-- Person 4 (Right) -->
    <circle cx="950" cy="400" r="45" fill="#263238" />
    <path d="M 880 450 Q 950 430 1020 450 L 1040 650 L 860 650 Z" fill="#607D8B" />
  </g>

  <!-- The Helm (Steering Wheel) -->
  <circle cx="600" cy="550" r="80" fill="none" stroke="#212121" stroke-width="12" />
  <line x1="600" y1="470" x2="600" y2="630" stroke="#212121" stroke-width="6" />
  <line x1="520" y1="550" x2="680" y2="550" stroke="#212121" stroke-width="6" />
  
  <!-- Subtle Lighting Effects -->
  <rect width="1200" height="675" fill="white" opacity="0.05" />
</svg>
