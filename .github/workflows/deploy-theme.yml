name: Deploy theme to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy theme via rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 65002 82.29.157.128 >> ~/.ssh/known_hosts
          rsync -avz --delete \
            -e "ssh -p 65002 -i ~/.ssh/deploy_key" \
            wp-theme/sales-compass/ \
            u783182544@82.29.157.128:domains/salescompass.net/public_html/wp-content/themes/sales-compass/
